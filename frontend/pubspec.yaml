name: triple_a
description: Triple A – Online Clothing Buy Website
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  http: ^1.2.1

  # Supabase (for Google OAuth)
  supabase_flutter: ^2.5.6

  # Local storage (cart persistence)
  shared_preferences: ^2.2.3

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  badges: ^3.1.2

  # Image picker
  image_picker: ^1.1.2
  mime: ^1.0.5

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
